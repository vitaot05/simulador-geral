<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeonato de Cidades</title>
<style>
:root{
  --bg:#0e0e10;--s1:#18181c;--s2:#222228;--s3:#2a2a32;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --t1:#f0f0f2;--t2:#9090a0;--t3:#55556a;
  --gn:#22c97a;--gn2:rgba(34,201,122,.1);
  --rd:#e25555;--rd2:rgba(226,85,85,.1);
  --gd:#f5c842;--gd2:rgba(245,200,66,.1);
  --bl:#5b9cf6;--bl2:rgba(91,156,246,.1);
  --pu:#b07ef5;--pu2:rgba(176,126,245,.1);
  --r:8px;--rl:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}

/* TOP NAV */
.topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 20px;display:flex;align-items:stretch;gap:0;position:sticky;top:0;z-index:200;}
.top-brand{font-size:14px;font-weight:600;color:var(--t1);padding:12px 16px 12px 0;display:flex;align-items:center;gap:6px;border-right:1px solid var(--b1);margin-right:8px;}
.top-brand span{color:var(--gd);}
.state-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.state-tab:hover{color:var(--t1);}
.state-tab.active{color:var(--gd);border-bottom-color:var(--gd);}
.state-tab.regional-tab{color:var(--pu);}
.state-tab.regional-tab.active{color:var(--pu);border-bottom-color:var(--pu);}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.pill{font-size:11px;color:var(--t2);background:var(--s2);border:1px solid var(--b1);padding:3px 10px;border-radius:20px;}
.pill.gold{color:var(--gd);}

/* LAYOUT */
.main{display:grid;grid-template-columns:220px 1fr;}

/* SIDEBAR */
.sidebar{background:var(--s1);border-right:1px solid var(--b1);padding:12px 8px;display:flex;flex-direction:column;gap:3px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;padding:8px 8px 3px;}
.nav-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:13px;border:1px solid transparent;transition:all .13s;user-select:none;}
.nav-item:hover{background:var(--s2);color:var(--t1);}
.nav-item.active{background:var(--s2);color:var(--t1);border-color:var(--b2);}
.nav-item .round-badge{margin-left:auto;font-size:10px;color:var(--t3);background:var(--s3);padding:1px 6px;border-radius:10px;}
.nav-item.active .round-badge{color:var(--t2);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sep{height:1px;background:var(--b1);margin:4px 0;}

/* CONTROLS */
.ctrl{padding:6px;display:flex;flex-direction:column;gap:6px;}
.spd-lbl{font-size:10px;color:var(--t3);text-align:center;}
.spd-row{display:flex;gap:3px;}
.spd{flex:1;padding:4px 2px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-size:10px;cursor:pointer;}
.spd.active,.spd:hover{background:var(--s2);color:var(--t1);border-color:var(--b2);}
.btn{width:100%;padding:8px 10px;border-radius:var(--r);border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .13s;text-align:center;}
.btn:hover:not(:disabled){background:var(--s3);border-color:rgba(255,255,255,.2);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-gd{background:var(--gd2);border-color:rgba(245,200,66,.3);color:var(--gd);}
.btn-gd:hover:not(:disabled){background:rgba(245,200,66,.18);}
.btn-gn{background:var(--gn2);border-color:rgba(34,201,122,.3);color:var(--gn);}
.btn-gn:hover:not(:disabled){background:rgba(34,201,122,.18);}
.rnd-hint{text-align:center;font-size:11px;color:var(--t3);}
.rnd-hint strong{color:var(--t2);}
.vh{display:none!important;}

/* CONTENT */
.content{padding:16px;overflow-y:auto;min-height:calc(100vh - 49px);}

/* TICKER */
.ticker{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:13px 15px;margin-bottom:16px;display:none;}
.ticker.on{display:block;}
.tck-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.tck-clock{font-size:22px;font-weight:700;color:var(--gd);font-family:monospace;font-variant-numeric:tabular-nums;}
.tck-dlbl{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;}
.tck-match{display:flex;align-items:center;justify-content:center;gap:10px;font-size:15px;margin-bottom:8px;}
.tck-team{flex:1;text-align:right;font-weight:500;}
.tck-team.away{text-align:left;}
.tck-score{font-size:26px;font-weight:700;font-family:monospace;color:var(--t1);background:var(--s2);border:1px solid var(--b1);padding:3px 14px;border-radius:var(--r);min-width:78px;text-align:center;}
.tck-bar{height:3px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:7px;}
.tck-fill{height:100%;background:var(--gd);border-radius:99px;transition:width .08s linear;}
.goal-feed{max-height:64px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.gev{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 7px;background:var(--gd2);border-radius:5px;border-left:2px solid var(--gd);animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.gmin{color:var(--gd);font-weight:700;min-width:26px;font-family:monospace;}

/* GRID */
.grid-mode{display:none;margin-bottom:16px;}
.grid-mode.on{display:block;}
.gm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.gm-clock{font-size:18px;font-weight:700;color:var(--gd);font-family:monospace;}
.gm-bar{height:3px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:10px;}
.gm-fill{height:100%;background:var(--gd);border-radius:99px;transition:width .08s linear;}
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:6px;}
.mc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;}
.mc-top{display:flex;justify-content:space-between;margin-bottom:4px;}
.mc-dlbl{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.05em;}
.mc-t{font-size:10px;color:var(--gd);font-family:monospace;font-weight:600;}
.mc-teams{display:flex;align-items:center;gap:4px;}
.mc-name{flex:1;font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-name.r{text-align:right;}
.mc-sc{font-size:13px;font-weight:700;color:var(--t1);font-family:monospace;min-width:30px;text-align:center;}
.mc-bar{height:2px;background:var(--s2);border-radius:99px;margin-top:5px;overflow:hidden;}
.mc-fill{height:100%;background:var(--gd);border-radius:99px;}
.mc-ev{font-size:10px;color:var(--t2);margin-top:3px;min-height:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* STANDINGS + FIXTURES LAYOUT */
.standings-layout{display:grid;grid-template-columns:1fr 280px;gap:14px;align-items:start;}
.div-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.div-dot-lg{width:9px;height:9px;border-radius:50%;}
.div-title{font-size:15px;font-weight:600;}
.leg{display:flex;gap:12px;margin-bottom:7px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t3);}
.leg-dot{width:6px;height:6px;border-radius:50%;}
.tbl-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead th{padding:6px 7px;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;text-align:center;background:var(--s2);border-bottom:1px solid var(--b1);}
thead th.nc{text-align:left;padding-left:10px;width:35%;}
thead th.pc{width:28px;}
tbody td{padding:5px 7px;text-align:center;font-size:12px;font-variant-numeric:tabular-nums;color:var(--t2);border-bottom:1px solid var(--b1);}
tbody tr:last-child td{border-bottom:none;}
tbody td.nc{text-align:left;padding-left:0;color:var(--t1);font-weight:500;font-size:12px;}
tbody td.ptsc{font-weight:700;color:var(--t1);}
tbody td.posc{color:var(--t3);font-weight:600;padding-left:0;padding-right:0;}
.rp{background:rgba(34,201,122,.04);}
.rr{background:rgba(226,85,85,.04);}
.bp{border-left:2px solid var(--gn);}
.br{border-left:2px solid var(--rd);}
.bn{border-left:2px solid transparent;}
.sgp{color:var(--gn);}
.sgn{color:var(--rd);}

/* FIXTURES PANEL */
.fix-panel{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;position:sticky;top:65px;}
.fix-hdr{background:var(--s2);padding:8px 12px;font-size:11px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--b1);}
.fix-list{max-height:520px;overflow-y:auto;}
.fix-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid var(--b1);font-size:11px;}
.fix-item:last-child{border-bottom:none;}
.fix-home{flex:1;text-align:right;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fix-vs{color:var(--t3);font-size:10px;flex-shrink:0;}
.fix-away{flex:1;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* RESULTS */
.res-sec{margin-bottom:14px;}
.res-dlbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px;}
.rc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;}
.rc-row{display:flex;align-items:center;gap:5px;}
.rc-n{flex:1;font-size:11px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-n.r{text-align:right;}
.rc-sc{font-size:12px;font-weight:700;color:var(--t1);background:var(--s2);border:1px solid var(--b1);padding:2px 7px;border-radius:5px;white-space:nowrap;font-family:monospace;}
.rc-w{color:var(--gn);}

/* ARTILHARIA */
.art-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.art-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;}
.art-hdr{background:var(--s2);padding:8px 12px;font-size:11px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--b1);}
.art-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--b1);font-size:12px;}
.art-row:last-child{border-bottom:none;}
.art-pos{color:var(--t3);font-weight:600;width:18px;text-align:center;flex-shrink:0;}
.art-name{flex:1;color:var(--t1);}
.art-team{font-size:10px;color:var(--t3);}
.art-val{font-weight:700;color:var(--gd);min-width:20px;text-align:center;}
.art-val.gn{color:var(--gn);}
.empty{padding:32px;text-align:center;color:var(--t3);font-size:12px;}

/* HISTORICO */
.hist-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;}
.hist-hdr{background:var(--s2);padding:8px 12px;font-size:12px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--b1);}
.hist-row{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid var(--b1);font-size:11px;gap:8px;}
.hist-row:last-child{border-bottom:none;}
.hist-lbl{color:var(--t3);flex-shrink:0;}
.hist-val{color:var(--t1);text-align:right;}
.hist-val.gold{color:var(--gd);font-weight:600;}
.hist-val.gn{color:var(--gn);}
.hist-val.rd{color:var(--rd);}

/* REGIONAL */
.reg-section{margin-bottom:20px;}
.reg-title{font-size:14px;font-weight:600;color:var(--pu);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.bracket{display:flex;gap:0;align-items:stretch;}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;min-width:220px;}
.bracket-round-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;padding:0 12px;}
.bracket-match{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin:6px 12px;overflow:hidden;}
.bracket-team{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;font-size:12px;border-bottom:1px solid var(--b1);}
.bracket-team:last-child{border-bottom:none;}
.bracket-team.winner{background:rgba(245,200,66,.07);color:var(--gd);font-weight:600;}
.bracket-team.tbd{color:var(--t3);}
.bracket-sc{font-weight:700;font-family:monospace;font-size:13px;}
.bracket-conn{display:flex;align-items:center;justify-content:center;width:24px;flex-shrink:0;}
.bracket-conn-line{width:12px;height:2px;background:var(--b2);}
.reg-info{font-size:12px;color:var(--t3);padding:10px;background:var(--s2);border-radius:var(--r);margin-bottom:14px;}

/* NOTIFICATION */
.notif{position:fixed;bottom:20px;right:20px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--rl);padding:11px 15px;font-size:12px;color:var(--t1);z-index:999;animation:su .3s ease;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.notif-title{font-weight:600;color:var(--gd);margin-bottom:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="top-brand">🏙️ <span>Cidades</span>FC</div>
  <div class="state-tab active" id="tab-SP" onclick="switchState('SP')">São Paulo</div>
  <div class="state-tab" id="tab-RJ" onclick="switchState('RJ')">Rio de Janeiro</div>
  <div class="state-tab regional-tab" id="tab-REG" onclick="switchState('REG')">🏆 Regional</div>
  <div class="top-right">
    <div class="pill gold" id="season-pill">Temporada 2024</div>
    <div class="pill" id="round-pill">—</div>
  </div>
</div>

<div class="main">
<div class="sidebar">
  <div id="sidebar-divs"></div>
  <div class="sep"></div>
  <div class="nav-item" onclick="showContent('results')">⚽ Resultados</div>
  <div class="nav-item" onclick="showContent('artilharia')">🥅 Artilharia</div>
  <div class="nav-item" onclick="showContent('historico')">📋 Histórico</div>
  <div class="sep"></div>
  <div class="sec-lbl">Simular</div>
  <div class="ctrl">
    <div class="spd-lbl">Velocidade</div>
    <div class="spd-row">
      <button class="spd" onclick="setSpd(80)">Lento</button>
      <button class="spd active" onclick="setSpd(35)">Normal</button>
      <button class="spd" onclick="setSpd(12)">Rápido</button>
      <button class="spd" onclick="setSpd(2)">Turbo</button>
    </div>
    <button class="btn btn-gd" id="btn-match" onclick="doNextMatch()">▶ Próximo jogo</button>
    <button class="btn" id="btn-rodada" onclick="doRodadaGrid()">⊞ Simular rodada</button>
    <button class="btn" id="btn-direto" onclick="doRodadaDireto()">⚡ Resultado direto</button>
    <button class="btn" id="btn-season" onclick="doSimTempSingle()">⏭ Simular temporada</button>
    <button class="btn btn-gn vh" id="btn-next-season" onclick="doNextSeason()">→ Próxima temporada</button>
    <div class="rnd-hint">Rodada <strong id="rnum">0</strong> / 38</div>
  </div>
</div>

<div class="content" id="main-content">
  <div class="ticker" id="ticker">
    <div class="tck-top">
      <div>
        <div class="tck-dlbl" id="t-div">—</div>
        <div class="tck-clock" id="t-clock">00'</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--t2)" id="t-round">Rodada 1</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px">ao vivo</div>
      </div>
    </div>
    <div class="tck-match">
      <div class="tck-team" id="t-home">-</div>
      <div class="tck-score" id="t-score">0 × 0</div>
      <div class="tck-team away" id="t-away">-</div>
    </div>
    <div class="tck-bar"><div class="tck-fill" id="t-fill" style="width:0%"></div></div>
    <div class="goal-feed" id="t-feed"></div>
  </div>

  <div class="grid-mode" id="grid-mode">
    <div class="gm-top">
      <div style="font-size:12px;color:var(--t2)">Rodada <strong id="gm-round" style="color:var(--t1)">-</strong></div>
      <div class="gm-clock" id="gm-clock">00'</div>
    </div>
    <div class="gm-bar"><div class="gm-fill" id="gm-fill" style="width:0%"></div></div>
    <div id="gm-sections"></div>
  </div>

  <div id="view-standings"></div>
  <div id="view-results" class="vh"></div>
  <div id="view-artilharia" class="vh"></div>
  <div id="view-historico" class="vh"></div>
  <div id="view-regional" class="vh"></div>
</div>
</div>

function getStateInfo(sigla){ return DATA.estados.find(e=>e.sigla===sigla); }

function initAll(){
  season = 2024;
  historico = [];

  for(const e of DATA.estados) initState(e);

function initState(estadoInfo){
  const sig = estadoInfo.sigla;
  const divNames = estadoInfo.nomes_divisoes;
  const allTeams = [...estadoInfo.equipes];
  stateData[sig] = {};
  artStats[sig] = {};
  for(const t of allTeams) artStats[sig][t] = {};
  const perDiv = Math.floor(allTeams.length / divNames.length);
  divNames.forEach((dn, di) => {
    const slice = allTeams.slice(di*perDiv, (di+1)*perDiv);
    stateData[sig][dn] = { teams: slice.map(mkT), round: 0, queue: [], lastRes: [] };
  });
}

function mkT(name){ return {name,pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0}; }

// PLAYERS
function getPlayers(sigla, teamName){
  const e = getStateInfo(sigla);
  return e && e.jogadores && e.jogadores[teamName] ? e.jogadores[teamName] : [];
}
function getScorer(sigla, teamName){
  const players = getPlayers(sigla, teamName).filter(p=>p.posicao!=='GOL');
  if(!players.length) return null;
  return players[Math.floor(Math.random()*players.length)];
}
function getAssist(sigla, teamName, scorerApelido){
  const players = getPlayers(sigla, teamName).filter(p=>p.posicao!=='GOL'&&p.apelido!==scorerApelido);
  if(!players.length) return null;
  return players[Math.floor(Math.random()*players.length)];
}
function addGoal(sigla, teamName, scorerApelido, assistApelido){
  if(!artStats[sig]) return;
  if(!artStats[sigla][teamName]) artStats[sigla][teamName]={};
  if(!artStats[sigla][teamName][scorerApelido]) artStats[sigla][teamName][scorerApelido]={gols:0,assist:0};
  artStats[sigla][teamName][scorerApelido].gols++;
  if(assistApelido){
    if(!artStats[sigla][teamName][assistApelido]) artStats[sigla][teamName][assistApelido]={gols:0,assist:0};
    artStats[sigla][teamName][assistApelido].assist++;
  }
}

// MATCH SIM
function simMatch(home, away, sigla){
  const goals = [];
  const total = Math.floor(Math.random()*6);
  const mins = Array.from({length:total},()=>Math.floor(Math.random()*90)+1).sort((a,b)=>a-b);
  let gh=0,ga=0;
  for(const min of mins){
    const isH = Math.random()<0.5;
    const teamName = isH ? home.name : away.name;
    const scorer = getScorer(sigla, teamName);
    const assist = scorer ? getAssist(sigla, teamName, scorer.apelido) : null;
    if(scorer){
      if(!artStats[sigla][teamName]) artStats[sigla][teamName]={};
      if(!artStats[sigla][teamName][scorer.apelido]) artStats[sigla][teamName][scorer.apelido]={gols:0,assist:0,nome:scorer.nome+' '+scorer.sobrenome};
      artStats[sigla][teamName][scorer.apelido].gols++;
    }
    if(assist){
      if(!artStats[sigla][teamName]) artStats[sigla][teamName]={};
      if(!artStats[sigla][teamName][assist.apelido]) artStats[sigla][teamName][assist.apelido]={gols:0,assist:0,nome:assist.nome+' '+assist.sobrenome};
      artStats[sigla][teamName][assist.apelido].assist++;
    }
    if(isH) gh++;
    else ga++;
    goals.push({min, side: isH?'home':'away', scorer: scorer?scorer.apelido:null, team: teamName});
  }
  if(gh>ga){home.v++;away.d++;home.pts+=3;}
  else if(ga>gh){away.v++;home.d++;away.pts+=3;}
  else{home.e++;away.e++;home.pts+=1;away.pts+=1;}
  home.j++;away.j++;home.gp+=gh;home.gc+=ga;home.sg=home.gp-home.gc;
  away.gp+=ga;away.gc+=gh;away.sg=away.gp-away.gc;
  return {home:home.name,away:away.name,gh,ga,goals};
}

function sortD(arr){ arr.sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp||a.name.localeCompare(b.name)); }

function getPairs(teams, rnd){
  const n=teams.length,pivot=teams[0],rest=teams.slice(1);
  const off=(rnd-1)%(n-1);
  const rot=rest.slice(off).concat(rest.slice(0,off));
  const all=[pivot,...rot],pairs=[];
  for(let i=0;i<n/2;i++) pairs.push([all[i],all[n-1-i]]);
  return pairs;
}

function buildQueue(sig, dn, rnd){
  return getPairs(stateData[sig][dn].teams, rnd).map(([a,b])=>({sig,dn,home:a,away:b}));
}

function curDivData(){ return stateData[curState][curDiv]; }

// BUSY
function setBusy(b){
  busy=b;
  ['btn-match','btn-rodada','btn-direto','btn-season'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.disabled=b||allSeasonsDone();
  });
}

function allSeasonsDone(){
  for(const e of DATA.estados){
    const sig=e.sigla;
    for(const dn of e.nomes_divisoes){
      if(!seasonDone[sig]||!seasonDone[sig][dn]) return false;
    }
  }
  return true;
}

function checkAllDone(){
  if(allSeasonsDone()){
    setNextSeasonBtn(true);
    // unlock regional for next season if we have prev champs
  }
}

function setNextSeasonBtn(show){
  const el=document.getElementById('btn-next-season');
  if(el) el.classList.toggle('vh',!show);
  ['btn-match','btn-rodada','btn-direto','btn-season'].forEach(id=>{
    const el2=document.getElementById(id);
    if(el2) el2.disabled=show;
  });
}

// PREP ROUND
function prepRound(sig, dn){
  const d = stateData[sig][dn];
  if(!d.queue.length && !seasonDone[sig]?.[dn]){
    d.round++;
    d.lastRes=[];
    d.queue = buildQueue(sig, dn, d.round);
    renderSidebar();
    updTopPills();
  }
}

function checkDivDone(sig, dn){
  const d = stateData[sig][dn];
  if(d.round===38 && !d.queue.length){
    if(!seasonDone[sig]) seasonDone[sig]={};
    if(!seasonDone[sig][dn]){
      seasonDone[sig][dn]=true;
      renderSidebar();
      checkAllDone();
    }
  }
}

// TICKER
function hideTicker(){ clearInterval(tickIv);tickIv=null;document.getElementById('ticker').classList.remove('on'); }
function hideGrid(){ clearInterval(gridIv);gridIv=null;document.getElementById('grid-mode').classList.remove('on'); }

function playTicker(item, onDone){
  const {sig,dn,home,away}=item;
  const result=simMatch(home,away,sig);
  hideTicker();hideGrid();
  const el=document.getElementById('ticker');
  el.classList.add('on');
  document.getElementById('t-div').textContent=`${getStateInfo(sig).nome} — ${dn}`;
  document.getElementById('t-round').textContent=`Rodada ${stateData[sig][dn].round}`;
  document.getElementById('t-home').textContent=home.name;
  document.getElementById('t-away').textContent=away.name;
  document.getElementById('t-score').textContent='0 × 0';
  document.getElementById('t-feed').innerHTML='';
  document.getElementById('t-fill').style.width='0%';
  let elapsed=0,gh=0,ga=0;
  const goals=[...result.goals];
  clearInterval(tickIv);
  tickIv=setInterval(()=>{
    elapsed++;
    document.getElementById('t-clock').textContent=String(elapsed).padStart(2,'0')+"'";
    document.getElementById('t-fill').style.width=(elapsed/90*100)+'%';
    while(goals.length&&goals[0].min<=elapsed){
      const g=goals.shift();
      if(g.side==='home')gh++;else ga++;
      document.getElementById('t-score').textContent=`${gh} × ${ga}`;
      const feed=document.getElementById('t-feed');
      const ev=document.createElement('div');
      ev.className='gev';
      ev.innerHTML=`<span class="gmin">${g.min}'</span><span>⚽</span><span style="color:var(--t2)">${g.scorer?g.scorer+' ('+g.team+')':g.team}</span>`;
      feed.prepend(ev);
    }
    if(elapsed>=90){clearInterval(tickIv);tickIv=null;onDone(result);}
  },tickSpd);
}

// NEXT MATCH (BRASFOOT)
function doNextMatch(){
  if(busy||seasonDone[curState]?.[curDiv]) return;
  prepRound(curState,curDiv);
  const d=curDivData();
  if(!d.queue.length) return;
  setBusy(true);
  const item=d.queue.shift();
  playTicker(item,(result)=>{
    d.lastRes.push(result);
    sortD(d.teams);
    renderStandings();
    setBusy(false);
    if(!d.queue.length) checkDivDone(curState,curDiv);
  });
}

// GRID (all games of current div simultaneously)
function doRodadaGrid(){
  if(busy||seasonDone[curState]?.[curDiv]) return;
  prepRound(curState,curDiv);
  const d=curDivData();
  if(!d.queue.length) return;
  setBusy(true);
  hideTicker();
  const allItems=[...d.queue];
  d.queue=[];
  const allResults=allItems.map(item=>({...item,result:simMatch(item.home,item.away,item.sig)}));
  d.lastRes=allResults.map(x=>x.result);

  const gm=document.getElementById('grid-mode');
  gm.classList.add('on');
  document.getElementById('gm-round').textContent=d.round;
  document.getElementById('gm-clock').textContent="00'";
  document.getElementById('gm-fill').style.width='0%';

  const sections=document.getElementById('gm-sections');
  sections.innerHTML='';
  const lbl=document.createElement('div');
  lbl.style.cssText='font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;';
  lbl.textContent=`${getStateInfo(curState).nome} — ${curDiv}`;
  sections.appendChild(lbl);
  const grid=document.createElement('div');
  grid.className='mini-grid';
  const mcMap={};
  allResults.forEach((x,i)=>{
    const id=`mc-${i}`;
    const card=document.createElement('div');
    card.className='mc';card.id=id;
    card.innerHTML=`<div class="mc-top"><span class="mc-dlbl">${curDiv}</span><span class="mc-t" id="${id}-t">00'</span></div>
      <div class="mc-teams"><span class="mc-name r" id="${id}-h">${x.home.name}</span><span class="mc-sc" id="${id}-s">0×0</span><span class="mc-name" id="${id}-a">${x.away.name}</span></div>
      <div class="mc-bar"><div class="mc-fill" id="${id}-b" style="width:0%"></div></div>
      <div class="mc-ev" id="${id}-e"></div>`;
    grid.appendChild(card);
    mcMap[id]={...x,gh:0,ga:0,goals:[...x.result.goals]};
  });
  sections.appendChild(grid);

  let elapsed=0;
  clearInterval(gridIv);
  gridIv=setInterval(()=>{
    elapsed++;
    const pct=elapsed/90*100;
    document.getElementById('gm-clock').textContent=String(elapsed).padStart(2,'0')+"'";
    document.getElementById('gm-fill').style.width=pct+'%';
    for(const[id,state]of Object.entries(mcMap)){
      document.getElementById(id+'-t').textContent=String(elapsed).padStart(2,'0')+"'";
      document.getElementById(id+'-b').style.width=pct+'%';
      while(state.goals.length&&state.goals[0].min<=elapsed){
        const g=state.goals.shift();
        if(g.side==='home')state.gh++;else state.ga++;
        document.getElementById(id+'-s').textContent=`${state.gh}×${state.ga}`;
        const name=g.scorer?g.scorer:g.team;
        document.getElementById(id+'-e').textContent=`⚽ ${g.min}' ${name}`;
      }
    }
    if(elapsed>=90){
      clearInterval(gridIv);gridIv=null;
      sortD(d.teams);
      renderStandings();
      setBusy(false);
      checkDivDone(curState,curDiv);
    }
  },tickSpd);
}

// DIRETO
function doRodadaDireto(){
  if(busy||seasonDone[curState]?.[curDiv]) return;
  prepRound(curState,curDiv);
  const d=curDivData();
  if(!d.queue.length) return;
  const items=[...d.queue];
  d.queue=[];
  d.lastRes=[];
  for(const item of items){
    const r=simMatch(item.home,item.away,item.sig);
    d.lastRes.push(r);
  }
  sortD(d.teams);
  hideTicker();hideGrid();
  renderStandings();
  checkDivDone(curState,curDiv);
  if(curContent==='standings') showContent('results');
}

// SIM TEMPORADA (current div instant)
function doSimTempSingle(){
  if(busy) return;
  const sig=curState,dn=curDiv,d=stateData[sig][dn];
  if(seasonDone[sig]?.[dn]) return;
  setBusy(true);
  hideTicker();hideGrid();
  // finish remaining rounds instantly
  if(d.queue.length){
    for(const item of d.queue){
      const r=simMatch(item.home,item.away,sig);
      d.lastRes.push(r);
    }
    d.queue=[];
    sortD(d.teams);
  }
  while(d.round<38){
    d.round++;
    d.lastRes=[];
    const q=buildQueue(sig,dn,d.round);
    for(const item of q){
      const r=simMatch(item.home,item.away,sig);
      d.lastRes.push(r);
    }
    sortD(d.teams);
  }
  if(!seasonDone[sig]) seasonDone[sig]={};
  seasonDone[sig][dn]=true;
  renderSidebar();
  renderStandings();
  setBusy(false);
  checkAllDone();
  notif(`${dn} ${getStateInfo(sig).nome} concluída!`,`Campeão: ${d.teams[0].name}`);
}

function doNextSeason(){

  const campMap={};
  const promoMap={};
  const rebMap={};
  for(const e of DATA.estados){
    const sig=e.sigla;
    campMap[sig]={};
    promoMap[sig]={};
    rebMap[sig]={};
    const divNames=e.nomes_divisoes;

      const d=stateData[sig][dn];
      campMap[sig][dn]=d.teams[0].name;

      if(di>0) promoMap[sig][dn]=d.teams.slice(0,cfg.promoN).map(t=>t.name);
      if(di<divNames.length-1) rebMap[sig][dn]=d.teams.slice(d.teams.length-cfg.rebN).map(t=>t.name);
    });
  }
  historico.push({season,campMap,promoMap,rebMap});

  // Setup regional for next season
  const spA1=stateData['SP']['A1'].teams;
  const rjA1=stateData['RJ']['A1'].teams;
  regional={
    available:true, season:season,
    participants:{
      sp1:spA1[0].name, sp2:spA1[1].name,
      rj1:rjA1[0].name, rj2:rjA1[1].name
    },
    matches:[], phase:'semis', done:false
  };

  // Rebuild teams with promotion/relegation
  for(const e of DATA.estados){
    const sig=e.sigla;
    const divNames=e.nomes_divisoes;
    const newLists={};
    divNames.forEach((dn,di)=>{
      const d=stateData[sig][dn];
      const cfg=DIV_CFG[dn]||{promoN:4,rebN:0};
      const rebN=cfg.rebN||0;
      const survivors=d.teams.slice(0,d.teams.length-rebN).map(t=>t.name);
      newLists[dn]=survivors;
    });
    // Add promoted/relegated
    divNames.forEach((dn,di)=>{
      if(di>0){
        const prevDn=divNames[di-1];
        const cfg=DIV_CFG[prevDn]||{promoN:4};
        const promoted=stateData[sig][prevDn].teams.slice(0,cfg.promoN).map(t=>t.name);
        newLists[dn]=[...newLists[dn],...promoted];
      }
      if(di<divNames.length-1){
        const nextDn=divNames[di+1];
        const cfg=DIV_CFG[dn]||{rebN:4};
        const relegated=stateData[sig][dn].teams.slice(stateData[sig][dn].teams.length-cfg.rebN).map(t=>t.name);
        newLists[nextDn]=[...newLists[nextDn],...relegated];
      }
    });
    // Rebuild stateData
    divNames.forEach(dn=>{
      stateData[sig][dn]={teams:newLists[dn].map(mkT),round:0,queue:[],lastRes:[]};
    });
    // Reset art stats
    for(const t of e.equipes) artStats[sig][t]={};
  }

  season++;
  seasonDone={};
  for(const e of DATA.estados) seasonDone[e.sigla]={};
  setNextSeasonBtn(false);
  renderSidebar();
  renderStandings();
  updTopPills();
  notif(`Temporada ${season} iniciada!`,regional.available?`Regional disponível: ${regional.participants.sp1}, ${regional.participants.sp2} vs ${regional.participants.rj1}, ${regional.participants.rj2}`:'');
}

// REGIONAL SIM
function simRegional(){
  if(!regional.available||regional.done) return;
  const p=regional.participants;
  if(regional.phase==='semis'&&!regional.matches.length){
    // Semifinais: 1SP vs 2RJ (ida/volta), 1RJ vs 2SP (ida/volta)
    const s1_ida=simRegMatch(p.sp1,p.rj2);
    const s1_vta=simRegMatch(p.rj2,p.sp1);
    const s2_ida=simRegMatch(p.rj1,p.sp2);
    const s2_vta=simRegMatch(p.sp2,p.rj1);
    const ag1h=(s1_ida.gh+s1_vta.ga),ag1a=(s1_ida.ga+s1_vta.gh);
    const ag2h=(s2_ida.gh+s2_vta.ga),ag2a=(s2_ida.ga+s2_vta.gh);
    const fin1=ag1h>ag1a?p.sp1:ag1a>ag1h?p.rj2:(Math.random()<0.5?p.sp1:p.rj2);
    const fin2=ag2h>ag2a?p.rj1:ag2a>ag2h?p.sp2:(Math.random()<0.5?p.rj1:p.sp2);
    regional.matches=[
      {phase:'Semi 1 — Ida',home:p.sp1,away:p.rj2,...s1_ida},
      {phase:'Semi 1 — Volta',home:p.rj2,away:p.sp1,...s1_vta,agg:`Agg: ${ag1h}×${ag1a}`,winner:fin1},
      {phase:'Semi 2 — Ida',home:p.rj1,away:p.sp2,...s2_ida},
      {phase:'Semi 2 — Volta',home:p.sp2,away:p.rj1,...s2_vta,agg:`Agg: ${ag2h}×${ag2a}`,winner:fin2},
    ];
    regional.finalists={f1:fin1,f2:fin2};
    regional.phase='final';
  } else if(regional.phase==='final'){
    const f=regional.finalists;
    const fin=simRegMatch(f.f1,f.f2);
    const winner=fin.gh>fin.ga?f.f1:fin.ga>fin.gh?f.f2:(Math.random()<0.5?f.f1:f.f2);
    regional.matches.push({phase:'Final',home:f.f1,away:f.f2,...fin,winner});
    regional.winner=winner;
    regional.done=true;
    notif('🏆 Campeão Regional!',winner);
  }
  renderRegional();
}

function simRegMatch(home,away){
  const total=Math.floor(Math.random()*5);
  const mins=Array.from({length:total},()=>Math.floor(Math.random()*90)+1).sort((a,b)=>a-b);
  let gh=0,ga=0;
  for(const min of mins){ if(Math.random()<0.5)gh++;else ga++; }
  return{home,away,gh,ga};
}

// RENDER SIDEBAR
function renderSidebar(){
  const e=getStateInfo(curState);
  if(!e){document.getElementById('sidebar-divs').innerHTML='';return;}
  let html='<div class="sec-lbl">Divisões</div>';
  for(const dn of e.nomes_divisoes){
    const cfg=DIV_CFG[dn]||{color:'var(--t3)'};
    const d=stateData[curState]?.[dn];
    const rnd=d?d.round:0;
    const done=seasonDone[curState]?.[dn];
    const active=(curContent==='standings'&&curDiv===dn)?'active':'';
    html+=`<div class="nav-item ${active}" onclick="switchDiv('${dn}')">
      <span class="dot" style="background:${cfg.color}"></span>${dn}
      <span class="round-badge">${done?'✓':rnd+'/38'}</span>
    </div>`;
  }
  document.getElementById('sidebar-divs').innerHTML=html;
}

// SHOW CONTENT
function showContent(type, dn){
  if(dn) curDiv=dn;
  curContent=type;
  ['standings','results','artilharia','historico','regional'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('vh',v!==type);
  });
  // Highlight sidebar
  renderSidebar();
  if(type==='standings') renderStandings();
  if(type==='results') renderResults();
  if(type==='artilharia') renderArtilharia();
  if(type==='historico') renderHistorico();
  if(type==='regional') renderRegional();
  updTopPills();
}

function switchDiv(dn){
  curDiv=dn;
  showContent('standings',dn);
}

function switchState(sig){
  if(sig==='REG'){ showContent('regional'); }
  else { curState=sig; curDiv=getStateInfo(sig).nomes_divisoes[0]; showContent('standings'); }
  document.querySelectorAll('.state-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+(sig==='REG'?'REG':sig)).classList.add('active');
}

// RENDER STANDINGS
function renderStandings(){
  if(curContent!=='standings') return;
  const sig=curState,dn=curDiv;
  const d=stateData[sig]?.[dn];
  if(!d){document.getElementById('view-standings').innerHTML='';return;}
  const teams=d.teams;
  const cfg=DIV_CFG[dn]||{color:'var(--t3)',promoN:4,rebN:0};
  const nxtRnd=d.round+1;
  const nxtPairs=nxtRnd<=38?getPairs(teams,nxtRnd):[];

  let tbl=`<div class="standings-layout">
    <div>
      <div class="div-hdr"><div class="div-dot-lg" style="background:${cfg.color}"></div><div class="div-title">${getStateInfo(sig).nome} — Série ${dn}</div></div>
      <div class="leg">
        <div class="leg-item"><div class="leg-dot" style="background:var(--gn)"></div>Promoção/acesso</div>
        ${cfg.rebN?'<div class="leg-item"><div class="leg-dot" style="background:var(--rd)"></div>Rebaixamento</div>':''}
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th class="pc">#</th><th class="nc">Cidade</th><th>Pts</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead>
        <tbody>${teams.map((t,i)=>{
          const pos=i+1,isP=pos<=cfg.promoN,isR=cfg.rebN&&pos>teams.length-cfg.rebN;
          const rc=isP?'rp':isR?'rr':'';
          const bc=isP?'bp':isR?'br':'bn';
          const sgc=t.sg>0?'sgp':t.sg<0?'sgn':'';
          return`<tr class="${rc}"><td class="posc ${bc}">${pos}</td><td class="nc">${t.name}</td>
            <td class="ptsc">${t.pts}</td><td>${t.j}</td><td>${t.v}</td><td>${t.e}</td><td>${t.d}</td>
            <td>${t.gp}</td><td>${t.gc}</td><td class="${sgc}">${t.sg>0?'+':''}${t.sg}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
    <div>
      <div class="fix-panel">
        <div class="fix-hdr">${nxtRnd<=38?`Rodada ${nxtRnd} — Próximos jogos`:'Temporada encerrada'}</div>
        <div class="fix-list">
          ${nxtPairs.length?nxtPairs.map(([a,b])=>`
            <div class="fix-item">
              <span class="fix-home">${a.name}</span>
              <span class="fix-vs">×</span>
              <span class="fix-away">${b.name}</span>
            </div>`).join(''):'<div class="empty">—</div>'}
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('view-standings').innerHTML=tbl;
}

// RENDER RESULTS
function renderResults(){
  let html='';
  for(const e of DATA.estados){
    const sig=e.sigla;
    for(const dn of e.nomes_divisoes){
      const d=stateData[sig]?.[dn];
      if(!d||!d.lastRes.length) continue;
      html+=`<div class="res-sec"><div class="res-dlbl">${e.nome} — ${dn} — Rodada ${d.round}</div><div class="res-grid">`;
      for(const r of d.lastRes){
        const hw=r.gh>r.ga,aw=r.ga>r.gh;
        html+=`<div class="rc"><div class="rc-row">
          <span class="rc-n r ${hw?'rc-w':''}">${r.home}</span>
          <span class="rc-sc">${r.gh}×${r.ga}</span>
          <span class="rc-n ${aw?'rc-w':''}">${r.away}</span>
        </div></div>`;
      }
      html+='</div></div>';
    }
  }
  document.getElementById('view-results').innerHTML=html||'<div class="empty">Nenhum resultado ainda.</div>';
}

// RENDER ARTILHARIA
function renderArtilharia(){
  let gols=[], assists=[];
  for(const e of DATA.estados){
    const sig=e.sigla;
    for(const [team, players] of Object.entries(artStats[sig]||{})){
      for(const [apelido, stats] of Object.entries(players)){
        const nome=stats.nome||apelido;
        if(stats.gols>0) gols.push({apelido,nome,team,sig,val:stats.gols});
        if(stats.assist>0) assists.push({apelido,nome,team,sig,val:stats.assist});
      }
    }
  }
  gols.sort((a,b)=>b.val-a.val);
  assists.sort((a,b)=>b.val-a.val);
  const top=20;
  const mkList=(arr,cor)=>arr.slice(0,top).map((x,i)=>`
    <div class="art-row">
      <span class="art-pos">${i+1}</span>
      <div class="art-name">${x.apelido}<div class="art-team">${x.nome} · ${x.team} (${x.sig})</div></div>
      <span class="art-val ${cor}">${x.val}</span>
    </div>`).join('');
  document.getElementById('view-artilharia').innerHTML=`
    <div class="div-title" style="margin-bottom:14px">Artilharia & Assistências</div>
    <div class="art-grid">
      <div class="art-card"><div class="art-hdr">⚽ Artileiros</div>${gols.length?mkList(gols,''):'<div class="empty">Nenhum gol ainda.</div>'}</div>
      <div class="art-card"><div class="art-hdr">🎯 Assistências</div>${assists.length?mkList(assists,'gn'):'<div class="empty">Nenhuma assistência ainda.</div>'}</div>
    </div>`;
}

// RENDER HISTORICO
function renderHistorico(){
  const c=document.getElementById('view-historico');
  if(!historico.length){c.innerHTML='<div class="empty">Nenhuma temporada concluída.</div>';return;}
  c.innerHTML=[...historico].reverse().map(h=>`
    <div class="hist-card">
      <div class="hist-hdr">Temporada ${h.season}</div>
      ${DATA.estados.map(e=>{
        const sig=e.sigla;
        return e.nomes_divisoes.map(dn=>`
          <div class="hist-row">
            <span class="hist-lbl">Campeão ${e.nome} ${dn}</span>
            <span class="hist-val gold">${h.campMap[sig]?.[dn]||'—'}</span>
          </div>`).join('');
      }).join('')}
    </div>`).join('');
}

// RENDER REGIONAL
function renderRegional(){
  const el=document.getElementById('view-regional');
  let html=`<div class="div-title" style="color:var(--pu);margin-bottom:14px">🏆 Copa Regional SP × RJ</div>`;
  if(!regional.available){
    html+=`<div class="reg-info">O Regional será disputado na próxima temporada com o 1º e 2º colocados da A1 de cada estado ao fim da temporada atual.</div>
    <div class="empty">Conclua a temporada para desbloquear o Regional.</div>`;
  } else {
    const p=regional.participants;
    html+=`<div class="reg-info" style="margin-bottom:14px">
      Temporada ${regional.season} · SP: <strong>${p.sp1}</strong> e <strong>${p.sp2}</strong> · RJ: <strong>${p.rj1}</strong> e <strong>${p.rj2}</strong>
    </div>`;
    if(!regional.matches.length){
      html+=`<div style="margin-bottom:12px;font-size:13px;color:var(--t2)">Chaveamento das semifinais:</div>
      <div style="font-size:13px;margin-bottom:6px;padding:8px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r)">
        <div style="margin-bottom:4px">🔵 <strong>${p.sp1}</strong> (SP 1º) vs <strong>${p.rj2}</strong> (RJ 2º) — Ida e Volta</div>
        <div>🔴 <strong>${p.rj1}</strong> (RJ 1º) vs <strong>${p.sp2}</strong> (SP 2º) — Ida e Volta</div>
      </div>
      <button class="btn btn-gd" style="width:auto;padding:8px 20px;margin-top:10px" onclick="simRegional()">▶ Simular Semifinais</button>`;
    } else {
      // Show bracket / results
      html+=`<div style="display:flex;flex-direction:column;gap:8px;max-width:500px">`;
      for(const m of regional.matches){
        const w=m.winner;
        html+=`<div class="hist-card">
          <div class="hist-hdr" style="color:var(--pu)">${m.phase}</div>
          <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;">
            <span style="flex:1;text-align:right;font-size:13px;color:${w===m.home?'var(--gd)':'var(--t2)'};font-weight:${w===m.home?'600':'400'}">${m.home}</span>
            <span style="font-size:16px;font-weight:700;font-family:monospace;background:var(--s2);border:1px solid var(--b1);padding:3px 12px;border-radius:6px">${m.gh} × ${m.ga}</span>
            <span style="flex:1;font-size:13px;color:${w===m.away?'var(--gd)':'var(--t2)'};font-weight:${w===m.away?'600':'400'}">${m.away}</span>
          </div>
          ${m.agg?`<div style="text-align:center;font-size:11px;color:var(--t3);padding-bottom:8px">${m.agg} · Classificado: <strong style="color:var(--gd)">${w}</strong></div>`:''}
          ${m.phase==='Final'&&w?`<div style="text-align:center;font-size:13px;color:var(--gd);padding:6px 0 10px;font-weight:600">🏆 Campeão: ${w}</div>`:''}
        </div>`;
      }
      html+='</div>';
      if(!regional.done){
        html+=`<button class="btn btn-gd" style="width:auto;padding:8px 20px;margin-top:10px" onclick="simRegional()">▶ Simular Final</button>`;
      }
    }
  }
  el.innerHTML=html;
}

// UTILS
function updTopPills(){
  document.getElementById('season-pill').textContent=`Temporada ${season}`;
  const d=curState!=='REG'?stateData[curState]?.[curDiv]:null;
  document.getElementById('round-pill').textContent=d?`${curState} ${curDiv} · Rodada ${d.round}/38`:'—';
  document.getElementById('rnum').textContent=d?d.round:'—';
}

function setSpd(ms){
  tickSpd=ms;
  document.querySelectorAll('.spd').forEach((b,i)=>b.classList.toggle('active',[80,35,12,2][i]===ms));
}

function notif(title,body){
  const el=document.createElement('div');
  el.className='notif';
  el.innerHTML=`<div class="notif-title">${title}</div><div style="color:var(--t2);font-size:11px">${body}</div>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

initAll();
</script>
